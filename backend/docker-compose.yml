services:
  mysql:
    image: mysql:8.4
    container_name: swaflow_mysql
    environment:
      MYSQL_DATABASE: ai_sales
      MYSQL_USER: ai_sales
      MYSQL_PASSWORD: ai_sales_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u ai_sales -pai_sales_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: swaflow_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
